# Managed by nicerobot/tools.repository (distribute-docs)
# Always present, self-gating: every docs repo carries this identical workflow,
# distributed from template.repo-docs by `git repo build distribute` (spec 008).
# The gate deploys whenever Pages can actually serve the site: a PUBLIC repo
# always builds (configure-pages self-enables Pages on first run), and a PRIVATE
# repo builds only when Pages is already enabled (paid plans allow private-repo
# Pages; on free plans the check finds nothing and the run stays neutral — no
# failure, no rename latch). Making the repo public, or enabling Pages on a
# private repo, requires no file change: the next push builds and deploys the
# Hugo site at the repo root with the GitHub Actions Pages source.
name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.check.outputs.deploy }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event.repository.private }}" != "true" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          elif gh api "repos/${{ github.repository }}/pages" --silent 2>/dev/null; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: gate
    if: ${{ needs.gate.outputs.deploy == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: latest
          extended: true
      - name: Build site
        run: hugo --minify --baseURL "${{ steps.pages.outputs.base_url }}/"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: [gate, build]
    if: ${{ needs.gate.outputs.deploy == 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
